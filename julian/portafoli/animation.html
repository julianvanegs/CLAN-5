<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet" />
    <style>

@import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wdth,wght@90.1,539&family=Instrument+Serif:ital@0;1&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wdth,wght@90.1,539&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');


        *{
          
                font-family: "Instrument Serif", serif;
            margin: 0px;
            padding: 0px;

        }
        .hero{
            background-color: black;
            overflow: hidden;
            position: relative;
            width: 100%;
            height: 175svh;
        }
        img{
            filter: opacity(0.6);
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hero-img{
            width: 100%;
            position: absolute;
            height: 100%;
        }
        .hero-header{
              
             color: rgb(240, 201, 27);
            width: 100%;
            height: 100svh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: absolute;
        }
        h1{
            font-weight: 400;
            font-size: clamp(2rem, 8.0rem, 15rem);
        }

         h2{
            font-size: clamp(1rem, 3.5rem, 7rem);
        }
        p {
            font-size: clamp(.7rem, 1.3rem, 4rem);
            padding: 10px   ;
        }
        .hero-about {
            position: absolute;
            bottom: 0;
            width: 100%;
            overflow: visible;
            height: 100svh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;

        }
        .hero-canvas{
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hero-about h2{
          
            z-index: 1;
            width: 65%;
            text-transform: uppercase;
            color: rgb(0, 0, 0);
            font-weight: 300
        }
        .difuminado{
            position: absolute;
            background-color: black;
            width: 0px;
            
            height:500px;
            box-shadow: 0px 0px 200px 100px black;
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-img">
            <img src="./vicky-hladynets-C8Ta0gwPbQg-unsplash.jpg" alt="">
        </div>
        <div class="hero-header">
            <h1>ANIMACION NUEVA</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Provident, placeat? Veniam enim voluptatibus, necessitatibus laudantium cumque h</p>
        </div>
        <canvas class="hero-canvas"></canvas>
        <div class="hero-about">

            <h2>Lorem ipsiciddawdaw  dwdwng elius i sunt omnis officiis eligendi magn</h2>
        </div>
    </section>
</body>
